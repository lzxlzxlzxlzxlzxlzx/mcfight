<svg xmlns="http://www.w3.org/2000/svg" width="64" height="512" viewBox="0 0 64 512">
  <defs>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8ff78" stop-opacity="0.2"/>
      <stop offset="35%" stop-color="#2ecc71" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#58ff9a" stop-opacity="1"/>
      <stop offset="65%" stop-color="#2ecc71" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a8ff78" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="0" width="48" height="512" fill="url(#beam)" filter="url(#glow)" rx="8"/>
  <rect x="24" y="0" width="16" height="512" fill="#e8fff0" opacity="0.85" rx="4"/>
</svg>
